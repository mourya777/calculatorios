name: calculator
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.0
  animations: ^2.0.11
  random_string: ^2.3.1
  get: ^4.7.3
  audioplayers: ^6.5.1

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0

  # 🆕 CALLING DEPENDENCIES
  agora_rtc_engine: ^6.5.3           # Direct Agora engine for calls
  permission_handler: ^11.3.1        # For microphone permissions
  flutter_local_notifications: ^17.2.4 # For incoming call notifications

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/ringtones/ringtone.mpeg